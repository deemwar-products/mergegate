name: mergegate
# Dogfood: mergegate gates its own PRs using the local composite action.
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
jobs:
  mergegate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build the CLI the action runs
        run: |
          curl -fsSL https://bun.sh/install | bash
          # The action's build/tests/checks gates shell out to bare `bun`/`bunx`,
          # so bun must stay on PATH for the `uses: ./` step below — not just here.
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          ~/.bun/bin/bun install --frozen-lockfile
          ~/.bun/bin/bun build ./src/cli.ts --target=node --outfile=bin/mergegate.mjs
      - name: DEBUG — surface bun test output (temporary, #24881)
        run: ~/.bun/bin/bun test 2>&1 | tail -80
      - uses: ./
        with:
          base: origin/main
